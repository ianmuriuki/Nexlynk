<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexlynk API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111114;
    --surface2: #18181d;
    --surface3: #1f1f26;
    --border: #2a2a35;
    --accent: #00e5a0;
    --accent2: #7c6aff;
    --accent3: #ff6b6b;
    --amber: #ffb547;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .base-url-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }
  .base-url-input:focus { border-color: var(--accent); }

  .token-display {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .token-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 10px;
    color: var(--accent);
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .group {
    border-bottom: 1px solid var(--border);
  }

  .group-header {
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .group-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .endpoint-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    transition: background 0.15s;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
  }

  .endpoint-btn:hover { background: var(--surface2); }
  .endpoint-btn.active { background: var(--surface3); border-right: 2px solid var(--accent); }

  .method-badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    min-width: 38px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .GET    { background: rgba(0,229,160,0.15); color: var(--accent); }
  .POST   { background: rgba(124,106,255,0.15); color: var(--accent2); }
  .PATCH  { background: rgba(255,181,71,0.15); color: var(--amber); }
  .PUT    { background: rgba(255,181,71,0.15); color: var(--amber); }
  .DELETE { background: rgba(255,107,107,0.15); color: var(--accent3); }

  .ep-path {
    color: var(--muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Request Panel ── */
  .request-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .current-method {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 6px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .send-btn:hover { background: #00ffb3; transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .send-btn .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .send-btn.loading .spinner { display: block; }
  .send-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .field-group { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .url-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--accent);
    font-size: 12px;
    word-break: break-all;
  }

  .param-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
    align-items: center;
  }

  input[type="text"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.6;
  }

  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--accent3);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 11px;
    transition: all 0.15s;
  }
  .remove-btn:hover { background: rgba(255,107,107,0.1); }

  .add-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    transition: all 0.15s;
    width: 100%;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .auth-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .auth-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
  }

  input[type="checkbox"] { accent-color: var(--accent); }

  /* ── Response Panel ── */
  .response-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .response-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .status-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--sans);
  }

  .status-2xx { background: rgba(0,229,160,0.15); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
  .status-4xx { background: rgba(255,181,71,0.15); color: var(--amber); border: 1px solid rgba(255,181,71,0.3); }
  .status-5xx { background: rgba(255,107,107,0.15); color: var(--accent3); border: 1px solid rgba(255,107,107,0.3); }
  .status-idle { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .response-meta {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .meta-chip {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .response-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .response-body::-webkit-scrollbar { width: 4px; }
  .response-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  pre {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* JSON syntax highlighting */
  .json-key    { color: #7c9fff; }
  .json-string { color: #98d982; }
  .json-number { color: #ffb547; }
  .json-bool   { color: #ff79c6; }
  .json-null   { color: var(--muted); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 32px;
    opacity: 0.4;
  }

  .empty-text {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    opacity: 0.5;
  }

  /* Token save indicator */
  .token-save {
    font-size: 10px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .token-save.show { opacity: 1; }

  /* Tab strip for body type */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    padding: 3px;
    border-radius: 6px;
    width: fit-content;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: var(--surface3);
    color: var(--text);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    NEXLYNK <span style="color:var(--muted);font-weight:400">/ API</span>
  </div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:11px;color:var(--muted)">BASE</span>
      <input class="base-url-input" id="baseUrl" value="http://localhost:5000/api" placeholder="http://localhost:5000/api" />
    </div>
    <div class="token-display">
      <span>TOKEN</span>
      <div class="token-badge" id="tokenBadge">not set</div>
    </div>
    <span class="token-save" id="tokenSave">✓ saved</span>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar"></div>

  <!-- Request Panel -->
  <div class="request-panel">
    <div class="panel-header">
      <div class="panel-title">
        <span id="currentMethod" class="method-badge GET">GET</span>
        <span id="currentName" style="font-size:13px">Select an endpoint</span>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendRequest()">
        <div class="spinner"></div>
        <span class="btn-text">▶ SEND</span>
      </button>
    </div>
    <div class="panel-body" id="requestBody">
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Pick an endpoint from the left</div>
      </div>
    </div>
  </div>

  <!-- Response Panel -->
  <div class="response-panel">
    <div class="response-header">
      <div class="panel-title" style="font-family:var(--sans);font-weight:700;font-size:14px">Response</div>
      <div class="response-meta">
        <span class="status-pill status-idle" id="statusPill">— IDLE</span>
        <span class="meta-chip" id="timePill" style="display:none"></span>
        <button class="copy-btn" id="copyBtn" onclick="copyResponse()" style="display:none">copy</button>
      </div>
    </div>
    <div class="response-body" id="responseBody">
      <div class="empty-state">
        <div class="empty-icon">◇</div>
        <div class="empty-text">Response will appear here</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Endpoint definitions ──────────────────────────────────
const ENDPOINTS = [
  {
    group: 'Auth', color: '#00e5a0',
    items: [
      { method:'POST', name:'Signup', path:'/auth/signup', auth:false,
        body: JSON.stringify({ role:'student', email:'test@test.com', password:'Test1234!', name:'John Doe' }, null, 2) },
      { method:'POST', name:'Login', path:'/auth/login', auth:false,
        body: JSON.stringify({ email:'test@test.com', password:'Test1234!' }, null, 2),
        onSuccess: (data) => { if(data.accessToken) saveToken(data.accessToken); } },
      { method:'POST', name:'Refresh Token', path:'/auth/refresh', auth:false,
        body: JSON.stringify({ refreshToken:'<paste_refresh_token>' }, null, 2) },
      { method:'POST', name:'Forgot Password', path:'/auth/forgot-password', auth:false,
        body: JSON.stringify({ email:'test@test.com' }, null, 2) },
      { method:'POST', name:'Logout', path:'/auth/logout', auth:false,
        body: JSON.stringify({ refreshToken:'<paste_refresh_token>' }, null, 2) },
    ]
  },
  {
    group: 'Student', color: '#7c6aff',
    items: [
      { method:'GET', name:'Get Profile', path:'/students/:id/profile', auth:true,
        params: [{key:'id', value:''}] },
      { method:'PATCH', name:'Update Profile', path:'/students/:id/profile', auth:true,
        params: [{key:'id', value:''}],
        body: JSON.stringify({ city:'Nairobi', university:'University of Nairobi', course:'Computer Science', year_of_study:3, discipline:'Software Engineering', skills:['Node.js','PostgreSQL'], about:'Passionate developer' }, null, 2) },
      { method:'POST', name:'Upload CV', path:'/students/:id/cv', auth:true,
        params: [{key:'id', value:''}],
        note:'Use curl or Postman for file uploads: curl -F "cv=@file.pdf"' },
    ]
  },
  {
    group: 'Opportunities', color: '#ffb547',
    items: [
      { method:'GET', name:'List Opportunities', path:'/opportunities', auth:true,
        query: [{key:'location', value:''},{key:'discipline', value:''},{key:'type', value:''},{key:'keyword', value:''},{key:'page', value:'1'},{key:'limit', value:'20'}] },
      { method:'POST', name:'Apply', path:'/opportunities/:id/apply', auth:true,
        params: [{key:'id', value:''}] },
    ]
  },
  {
    group: 'Company', color: '#ff6b6b',
    items: [
      { method:'POST', name:'Register Company', path:'/companies', auth:false,
        body: JSON.stringify({ email:'hr@company.com', password:'Test1234!', name:'Acme Corp', industry:'Technology', company_size:'50-200', description:'We build things', contact_name:'HR Manager', contact_email:'hr@company.com', contact_phone:'+254700000000' }, null, 2) },
      { method:'PATCH', name:'Update Company', path:'/companies/:id', auth:true,
        params: [{key:'id', value:''}],
        body: JSON.stringify({ description:'Updated description', website:'https://acme.com' }, null, 2) },
      { method:'POST', name:'Create Opportunity', path:'/companies/:id/opportunities', auth:true,
        params: [{key:'id', value:''}],
        body: JSON.stringify({ title:'Backend Developer Intern', description:'Work on our REST API using Node.js and PostgreSQL.', disciplines:['Software Engineering'], skills_required:['Node.js','PostgreSQL'], location:'Nairobi', type:'internship', positions:2, duration:'3 months', stipend:'KES 20,000/month', application_deadline:'2026-06-30', status:'published' }, null, 2) },
      { method:'GET', name:'List Applicants', path:'/companies/:id/applicants', auth:true,
        params: [{key:'id', value:''}],
        query: [{key:'page', value:'1'},{key:'limit', value:'20'}] },
      { method:'POST', name:'Upload Logo', path:'/companies/:id/logo', auth:true,
        params: [{key:'id', value:''}],
        note:'Use curl or Postman for file uploads: curl -F "logo=@logo.png"' },
    ]
  },
  {
    group: 'Admin', color: '#00e5a0',
    items: [
      { method:'GET', name:'Dashboard', path:'/admin/dashboard', auth:true },
      { method:'GET', name:'List Companies', path:'/admin/companies', auth:true,
        query: [{key:'status', value:'pending'},{key:'page', value:'1'},{key:'limit', value:'20'}] },
      { method:'POST', name:'Approve Company', path:'/admin/companies/:id/approve', auth:true,
        params: [{key:'id', value:''}] },
      { method:'GET', name:'List Applications', path:'/admin/applications', auth:true,
        query: [{key:'status', value:''},{key:'page', value:'1'},{key:'limit', value:'20'}] },
      { method:'PUT', name:'Update App Status', path:'/admin/applications/:id/status', auth:true,
        params: [{key:'id', value:''}],
        body: JSON.stringify({ status:'shortlisted', note:'Strong candidate' }, null, 2) },
    ]
  },
  {
    group: 'Files', color: '#7c6aff',
    items: [
      { method:'GET', name:'CV Signed URL', path:'/files/cv/:key', auth:true,
        params: [{key:'key', value:'cvs%2F<student_id>%2F<uuid>.pdf'}] },
      { method:'GET', name:'Logo Signed URL', path:'/files/logo/:key', auth:true,
        params: [{key:'key', value:'logos%2F<company_id>%2F<uuid>.png'}] },
    ]
  },
  {
    group: 'Health', color: '#00e5a0',
    items: [
      { method:'GET', name:'Health Check', path:'/../health', auth:false },
    ]
  },
];

// ── State ─────────────────────────────────────────────────
let activeEndpoint = null;
let lastResponse = null;

// ── Build sidebar ─────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  ENDPOINTS.forEach((group, gi) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'group';

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `<div class="group-dot" style="background:${group.color}"></div>${group.group}`;
    groupEl.appendChild(header);

    group.items.forEach((ep, ei) => {
      const btn = document.createElement('button');
      btn.className = 'endpoint-btn';
      btn.id = `ep-${gi}-${ei}`;
      btn.innerHTML = `
        <span class="method-badge ${ep.method}">${ep.method}</span>
        <span class="ep-path">${ep.name}</span>
      `;
      btn.onclick = () => selectEndpoint(ep, gi, ei);
      groupEl.appendChild(btn);
    });

    sidebar.appendChild(groupEl);
  });
}

// ── Select endpoint ───────────────────────────────────────
function selectEndpoint(ep, gi, ei) {
  // Clear active
  document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`ep-${gi}-${ei}`).classList.add('active');

  activeEndpoint = ep;

  // Update header
  const methodEl = document.getElementById('currentMethod');
  methodEl.textContent = ep.method;
  methodEl.className = `method-badge ${ep.method}`;
  document.getElementById('currentName').textContent = ep.name;

  // Build request form
  buildRequestForm(ep);

  // Clear response
  clearResponse();
}

function buildRequestForm(ep) {
  const panel = document.getElementById('requestBody');
  const baseUrl = document.getElementById('baseUrl').value;
  const resolvedPath = ep.path;

  let html = '';

  // URL display
  html += `
    <div class="field-group">
      <label>Endpoint URL</label>
      <div class="url-display" id="urlDisplay">${baseUrl}${resolvedPath}</div>
    </div>
  `;

  // Auth toggle
  html += `
    <div class="field-group">
      <label>Authorization</label>
      <div class="auth-row">
        <label class="auth-toggle">
          <input type="checkbox" id="useAuth" ${ep.auth ? 'checked' : ''} onchange="updateUrl()">
          Use saved Bearer token
        </label>
      </div>
    </div>
  `;

  // Path params
  if (ep.params && ep.params.length > 0) {
    html += `<div class="field-group"><label>Path Parameters</label>`;
    ep.params.forEach((p, i) => {
      html += `
        <div class="param-row">
          <input type="text" value="${p.key}" readonly style="color:var(--muted)" />
          <input type="text" id="param-${i}" value="${p.value}" placeholder="value" oninput="updateUrl()" />
        </div>
      `;
    });
    html += `</div>`;
  }

  // Query params
  if (ep.query && ep.query.length > 0) {
    html += `<div class="field-group"><label>Query Parameters</label>`;
    ep.query.forEach((q, i) => {
      html += `
        <div class="param-row">
          <input type="text" value="${q.key}" readonly style="color:var(--muted)" />
          <input type="text" id="query-${i}" value="${q.value}" placeholder="value" oninput="updateUrl()" />
        </div>
      `;
    });
    html += `</div>`;
  }

  // Body
  if (['POST','PATCH','PUT'].includes(ep.method) && ep.body) {
    html += `
      <div class="field-group">
        <label>Request Body (JSON)</label>
        <textarea id="reqBody" spellcheck="false">${ep.body}</textarea>
      </div>
    `;
  }

  // Note
  if (ep.note) {
    html += `
      <div style="background:rgba(255,181,71,0.08);border:1px solid rgba(255,181,71,0.2);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--amber);line-height:1.6">
        ⚠ ${ep.note}
      </div>
    `;
  }

  panel.innerHTML = html;
  updateUrl();
}

function updateUrl() {
  if (!activeEndpoint) return;
  const baseUrl = document.getElementById('baseUrl').value;
  let path = activeEndpoint.path;

  // Replace path params
  if (activeEndpoint.params) {
    activeEndpoint.params.forEach((p, i) => {
      const val = document.getElementById(`param-${i}`)?.value || `:${p.key}`;
      path = path.replace(`:${p.key}`, val || `:${p.key}`);
    });
  }

  // Build query string
  if (activeEndpoint.query) {
    const queryParts = [];
    activeEndpoint.query.forEach((q, i) => {
      const val = document.getElementById(`query-${i}`)?.value;
      if (val) queryParts.push(`${q.key}=${encodeURIComponent(val)}`);
    });
    if (queryParts.length) path += '?' + queryParts.join('&');
  }

  const urlDisplay = document.getElementById('urlDisplay');
  if (urlDisplay) urlDisplay.textContent = baseUrl + path;
}

// ── Send request ──────────────────────────────────────────
async function sendRequest() {
  if (!activeEndpoint) return;

  const btn = document.getElementById('sendBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const urlDisplay = document.getElementById('urlDisplay');
  const url = urlDisplay.textContent;
  const useAuth = document.getElementById('useAuth')?.checked;
  const token = localStorage.getItem('nexlynk_token');

  const headers = { 'Content-Type': 'application/json' };
  if (useAuth && token) headers['Authorization'] = `Bearer ${token}`;

  let body = undefined;
  if (['POST','PATCH','PUT'].includes(activeEndpoint.method)) {
    const bodyEl = document.getElementById('reqBody');
    if (bodyEl) {
      try { body = bodyEl.value; JSON.parse(body); }
      catch(e) { showError('Invalid JSON in request body'); btn.classList.remove('loading'); btn.disabled = false; return; }
    }
  }

  const start = Date.now();

  try {
    const response = await fetch(url, {
      method: activeEndpoint.method,
      headers,
      body,
    });

    const elapsed = Date.now() - start;
    const data = await response.json().catch(() => null);

    lastResponse = data;

    // Auto-save token if login
    if (activeEndpoint.onSuccess && data) activeEndpoint.onSuccess(data);

    showResponse(response.status, data, elapsed);
  } catch(err) {
    showError(err.message);
  }

  btn.classList.remove('loading');
  btn.disabled = false;
}

function showResponse(status, data, elapsed) {
  const pill = document.getElementById('statusPill');
  const timePill = document.getElementById('timePill');
  const copyBtn = document.getElementById('copyBtn');
  const body = document.getElementById('responseBody');

  // Status pill
  pill.textContent = `${status} ${getStatusText(status)}`;
  pill.className = 'status-pill ' + (status < 300 ? 'status-2xx' : status < 500 ? 'status-4xx' : 'status-5xx');

  timePill.textContent = `${elapsed}ms`;
  timePill.style.display = 'block';
  copyBtn.style.display = 'block';

  if (data) {
    body.innerHTML = `<pre>${syntaxHighlight(JSON.stringify(data, null, 2))}</pre>`;
  } else {
    body.innerHTML = `<pre style="color:var(--muted)">Empty response</pre>`;
  }
}

function showError(msg) {
  const pill = document.getElementById('statusPill');
  pill.textContent = 'ERROR';
  pill.className = 'status-pill status-5xx';
  document.getElementById('responseBody').innerHTML = `<pre style="color:var(--accent3)">${msg}</pre>`;
}

function clearResponse() {
  document.getElementById('statusPill').textContent = '— IDLE';
  document.getElementById('statusPill').className = 'status-pill status-idle';
  document.getElementById('timePill').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('responseBody').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">◇</div>
      <div class="empty-text">Response will appear here</div>
    </div>
  `;
  lastResponse = null;
}

// ── Token management ──────────────────────────────────────
function saveToken(token) {
  localStorage.setItem('nexlynk_token', token);
  updateTokenDisplay();
  const save = document.getElementById('tokenSave');
  save.classList.add('show');
  setTimeout(() => save.classList.remove('show'), 2000);
}

function updateTokenDisplay() {
  const token = localStorage.getItem('nexlynk_token');
  const badge = document.getElementById('tokenBadge');
  if (token) {
    badge.textContent = token.substring(0, 24) + '...';
    badge.style.color = 'var(--accent)';
  } else {
    badge.textContent = 'not set';
    badge.style.color = 'var(--muted)';
  }
}

// ── Copy response ─────────────────────────────────────────
function copyResponse() {
  if (!lastResponse) return;
  navigator.clipboard.writeText(JSON.stringify(lastResponse, null, 2));
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'copied!';
  setTimeout(() => btn.textContent = 'copy', 1500);
}

// ── Syntax highlight ──────────────────────────────────────
function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
    if (/^"/.test(match)) {
      if (/:$/.test(match)) return `<span class="json-key">${match}</span>`;
      return `<span class="json-string">${match}</span>`;
    }
    if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
    if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
    return `<span class="json-number">${match}</span>`;
  });
}

function getStatusText(status) {
  const map = { 200:'OK', 201:'Created', 204:'No Content', 400:'Bad Request', 401:'Unauthorized', 403:'Forbidden', 404:'Not Found', 409:'Conflict', 422:'Unprocessable', 500:'Server Error' };
  return map[status] || '';
}

// ── Init ──────────────────────────────────────────────────
buildSidebar();
updateTokenDisplay();

// Keyboard shortcut: Ctrl+Enter to send
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendRequest();
});
</script>
